<script src="app.js?v=10"></script>
<script>
// Force input backgrounds — MutationObserver to handle dynamically rendered inputs
(function() {
  function fixInputBg() {
    const isDark = document.documentElement.classList.contains('dark');
    const bg = isDark ? '#12121A' : '#FFFFFF';
    const fg = isDark ? '#F0F0F5' : '#1A1A2E';
    document.querySelectorAll('input[type="number"], input[type="date"], select.input-field').forEach(el => {
      el.style.setProperty('background-color', bg, 'important');
      el.style.setProperty('color', fg, 'important');
    });
  }
  const obs = new MutationObserver(fixInputBg);
  obs.observe(document.body, { childList: true, subtree: true });
  fixInputBg();
})();

// Premium moving background particles for app pages
(function() {
  const canvas = document.getElementById('app-particle-canvas');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  let width = 0;
  let height = 0;
  let particles = [];
  let tinyParticles = [];
  const mouse = { x: -1000, y: -1000 };

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }

  const COLORS = [
    { r: 124, g: 58, b: 237 },
    { r: 6, g: 182, b: 212 },
    { r: 108, g: 92, b: 231 }
  ];

  class Particle {
    constructor() {
      this.reset(true);
    }

    reset(initial) {
      this.x = Math.random() * (width || window.innerWidth);
      this.y = initial ? Math.random() * (height || window.innerHeight) : (height || window.innerHeight) + 12;
      this.size = Math.random() * 1.6 + 0.5;
      this.baseSize = this.size;
      this.vx = (Math.random() - 0.5) * 0.34;
      this.vy = -(Math.random() * 0.42 + 0.16);
      const c = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.r = c.r;
      this.g = c.g;
      this.b = c.b;
      this.alpha = Math.random() * 0.42 + 0.12;
      this.baseAlpha = this.alpha;
      this.life = Math.random() * 210 + 110;
      this.age = initial ? Math.random() * this.life : 0;
      this.pulse = Math.random() * Math.PI * 2;
      this.pulseSpeed = Math.random() * 0.02 + 0.004;
    }

    update() {
      this.age++;
      this.pulse += this.pulseSpeed;

      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      if (dist < 110) {
        const force = (110 - dist) / 110 * 0.35;
        this.vx += (dx / dist) * force;
        this.vy += (dy / dist) * force;
      }

      this.vx *= 0.985;
      this.vy *= 0.985;

      this.x += this.vx;
      this.y += this.vy;
      this.size = this.baseSize + Math.sin(this.pulse) * 0.25;

      const progress = this.age / this.life;
      if (progress < 0.2) {
        this.alpha = this.baseAlpha * (progress / 0.2);
      } else if (progress > 0.8) {
        this.alpha = this.baseAlpha * ((1 - progress) / 0.2);
      } else {
        this.alpha = this.baseAlpha;
      }

      if (this.age >= this.life || this.y < -24 || this.x < -24 || this.x > width + 24) {
        this.reset(false);
      }
    }

    draw() {
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = `rgba(${this.r},${this.g},${this.b},0.46)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.alpha})`;
      ctx.fill();
      ctx.restore();
    }
  }

  class TinyParticle {
    constructor() {
      this.reset(true);
    }

    reset(initial) {
      this.x = Math.random() * (width || window.innerWidth);
      this.y = initial ? Math.random() * (height || window.innerHeight) : (height || window.innerHeight) + 8;
      this.size = Math.random() * 0.8 + 0.2;
      this.baseSize = this.size;
      this.vx = (Math.random() - 0.5) * 0.18;
      this.vy = -(Math.random() * 0.2 + 0.06);
      const c = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.r = c.r;
      this.g = c.g;
      this.b = c.b;
      this.alpha = Math.random() * 0.26 + 0.08;
      this.baseAlpha = this.alpha;
      this.life = Math.random() * 260 + 140;
      this.age = initial ? Math.random() * this.life : 0;
      this.twinkle = Math.random() * Math.PI * 2;
      this.twinkleSpeed = Math.random() * 0.04 + 0.02;
    }

    update() {
      this.age++;
      this.twinkle += this.twinkleSpeed;
      this.x += this.vx;
      this.y += this.vy;

      this.size = this.baseSize + Math.sin(this.twinkle) * 0.12;

      const lifeProgress = this.age / this.life;
      if (lifeProgress < 0.15) {
        this.alpha = this.baseAlpha * (lifeProgress / 0.15);
      } else if (lifeProgress > 0.85) {
        this.alpha = this.baseAlpha * ((1 - lifeProgress) / 0.15);
      } else {
        this.alpha = this.baseAlpha;
      }

      if (this.age >= this.life || this.y < -10 || this.x < -10 || this.x > width + 10) {
        this.reset(false);
      }
    }

    draw() {
      ctx.save();
      ctx.shadowBlur = 6;
      ctx.shadowColor = `rgba(${this.r},${this.g},${this.b},0.35)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, Math.max(0.12, this.size), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${this.r},${this.g},${this.b},${this.alpha})`;
      ctx.fill();
      ctx.restore();
    }
  }

  function buildParticles() {
    const count = Math.max(65, Math.min(95, Math.round(window.innerWidth / 18)));
    const tinyCount = Math.max(120, Math.min(190, Math.round(window.innerWidth / 10)));
    particles = [];
    for (let i = 0; i < count; i++) particles.push(new Particle());
    tinyParticles = [];
    for (let i = 0; i < tinyCount; i++) tinyParticles.push(new TinyParticle());
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 82) {
          const alpha = (1 - dist / 82) * 0.05;
          const r = Math.floor((particles[i].r + particles[j].r) / 2);
          const g = Math.floor((particles[i].g + particles[j].g) / 2);
          const b = Math.floor((particles[i].b + particles[j].b) / 2);
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
          ctx.lineWidth = 0.55;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);
    tinyParticles.forEach(p => {
      p.update();
      p.draw();
    });
    drawConnections();
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    requestAnimationFrame(animate);
  }

  resize();
  buildParticles();
  animate();

  window.addEventListener('resize', () => {
    resize();
    buildParticles();
  });

  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });
})();
</script>
